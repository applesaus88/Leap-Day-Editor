name: Build editor (Windows .exe + macOS .app)

# Builds the full Leap Day Mod Studio editor as a standalone download, with a
# bundled JRE, so end users need no Python, no Java, and no Android NDK — just
# download and run. Triggered from the Actions tab, on pushes to main, or when a
# version tag (v*) is pushed. Artifacts are attached to the run; on a tag they're
# also published to a GitHub Release.
#
# Note: Linux is intentionally not auto-built. pywebview on Linux needs the system
# GTK/WebKit stack, which PyInstaller can't bundle portably. Linux users run from
# source (see the README) — that path is fully supported.

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags: [ "v*" ]

# the tag build creates a GitHub Release (softprops/action-gh-release), which
# needs write access to repository contents. The default token is read-only.
permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java (JRE to bundle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          java-package: jre

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller==6.20.0

      - name: Fetch signer jar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force vendor | Out-Null
          if (-not (Test-Path vendor/uber-apk-signer.jar)) {
            $u = "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar"
            Invoke-WebRequest -Uri $u -OutFile vendor/uber-apk-signer.jar
          }

      - name: Bundle JRE (so the user needs no Java install)
        shell: pwsh
        run: |
          Copy-Item -Recurse -Force "$env:JAVA_HOME" jre
          Write-Host "Bundled JRE from $env:JAVA_HOME"

      - name: Build executable
        run: python -m PyInstaller --noconfirm --distpath dist --workpath build_pyi studio/editor.spec

      - name: Smoke-test the exe (launches, opens webview, exits 0)
        shell: pwsh
        env:
          LDS_SMOKE: "1"
        run: |
          $p = Start-Process -FilePath "dist/LeapDayModStudio.exe" -PassThru
          if (-not $p.WaitForExit(90000)) {
            $p.Kill(); Write-Error "smoke: exe did not exit within 90s (hang)"; exit 1
          }
          if ($p.ExitCode -ne 0) {
            Write-Error "smoke: exe exited with code $($p.ExitCode)"; exit 1
          }
          Write-Host "smoke: exe launched and exited cleanly"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeapDayModStudio-windows
          path: dist/LeapDayModStudio.exe
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LeapDayModStudio.exe

  macos-app:
    runs-on: macos-14          # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java (JRE to bundle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          java-package: jre

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller==6.20.0

      - name: Fetch signer jar
        run: |
          mkdir -p vendor
          if [ ! -f vendor/uber-apk-signer.jar ]; then
            curl -sL -o vendor/uber-apk-signer.jar \
              https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar
          fi

      - name: Bundle JRE (so the user needs no Java install)
        run: |
          cp -R "$JAVA_HOME" jre
          echo "Bundled JRE from $JAVA_HOME"

      - name: Build app
        run: python -m PyInstaller --noconfirm --distpath dist --workpath build_pyi studio/editor.spec

      - name: Zip .app
        run: cd dist && zip -ry LeapDayModStudio-macos.zip LeapDayModStudio.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeapDayModStudio-macos
          path: dist/LeapDayModStudio-macos.zip
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LeapDayModStudio-macos.zip
